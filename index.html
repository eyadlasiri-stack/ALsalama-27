<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة السلامة 27 | حلي</title>
    
    <!-- خط تجول الاحترافي بأعلى جودة وأوزان -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #050508 0%, #0b0b10 100%);
            --card-bg: rgba(18, 18, 26, 0.85); /* تصميم زجاجي داكن */
            --card-border: rgba(255, 255, 255, 0.04);
            --accent-gold: #d4af37;   /* الذهبي الملكي للبطولة */
            --gold-glow: rgba(214, 175, 55, 0.15);
            --primary-crimson: #9e1b32; /* العنابي الفخم لشعار البطولة */
            --text-pure: #ffffff;
            --text-gray: #8a8f9e;
            --success-green: #00e676;
            --live-red: #ff3d00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-pure);
            line-height: 1.6;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* الهيدر الفخم المدمج بالهوية الرسمية */
        header {
            background: rgba(8, 8, 12, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 15px;
            text-align: center;
            border-bottom: 1.5px solid var(--primary-crimson); /* خط عنابي فخم يمثل هوية الشعار */
            position: sticky;
            top: 0;
            z-index: 999;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 900;
            background: linear-gradient(120deg, #ffffff 40%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.75rem;
            color: var(--text-gray);
            margin-top: 3px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 15px 12px;
        }

        /* التبويبات الفعالة */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: appFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= شريط العداد التنازلي المصغر الفخم جداً ================= */
        .mini-countdown-bar {
            background: rgba(158, 27, 50, 0.08); /* لمسة عنابية فائقة النعومة */
            border: 1px solid rgba(214, 175, 55, 0.25); /* إطار ذهبي مذهب */
            border-radius: 10px;
            padding: 8px 14px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .ticker-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-gold);
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 8px var(--accent-gold);
            animation: pulseDot 1.5s infinite;
        }

        @keyframes pulseDot {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .ticker-match-name {
            font-weight: 800;
            color: #fff;
            flex-grow: 1;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ticker-divider {
            color: rgba(255, 255, 255, 0.15);
            margin: 0 10px;
        }

        .mini-timer-text {
            font-weight: 900;
            color: var(--accent-gold);
            direction: ltr;
        }

        /* ================= تصميم بطاقات المباريات العصرية ================= */
        .day-group {
            margin-bottom: 24px;
        }

        .day-title {
            font-size: 0.82rem;
            font-weight: 800;
            color: var(--text-gray);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding-right: 2px;
        }

        .day-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: var(--primary-crimson);
            border-radius: 2px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
            transition: border-color 0.2s;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.72rem;
            color: var(--text-gray);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 10px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.65rem;
        }

        .status-upcoming { background: rgba(255, 255, 255, 0.04); color: var(--text-gray); }
        .status-live { background: rgba(255, 61, 0, 0.12); color: var(--live-red); border: 1px solid rgba(255, 61, 0, 0.2); animation: liveBlink 1.2s infinite alternate; }
        .status-completed { background: rgba(0, 230, 118, 0.1); color: var(--success-green); }

        @keyframes liveBlink { from { opacity: 0.7; } to { opacity: 1; } }

        .match-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .team-crest {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #161622 0%, #0f0f15 100%);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: var(--accent-gold);
            font-size: 1.1rem;
            margin-bottom: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .team-name {
            font-size: 0.85rem;
            font-weight: 800;
            text-align: center;
            color: #eeeef2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 105px;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 70px;
        }

        .score-value {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text-pure);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .vs-pill {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.04);
            padding: 3px 10px;
            border-radius: 20px;
            color: var(--text-gray);
            font-weight: 800;
        }

        /* حقول الشاشات الفارغة الفخمة */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-gray);
        }

        .empty-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        .empty-title {
            font-size: 0.88rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }

        .empty-desc {
            font-size: 0.72rem;
            color: var(--text-gray);
        }

        /* ================= جدول ترتيب الأفرقة الاحترافي ================= */
        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            text-align: center;
            min-width: 500px;
        }

        .custom-table th {
            background-color: rgba(6, 6, 8, 0.4);
            color: var(--text-gray);
            font-weight: 800;
            padding: 12px 6px;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--card-border);
        }

        .custom-table td {
            padding: 12px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.015);
            font-weight: 600;
        }

        .custom-table tr:last-child td {
            border-bottom: none;
        }

        .custom-table tr:nth-child(-n+4) .pos-cell {
            color: var(--accent-gold);
            font-weight: 900;
        }

        .text-start {
            text-align: right;
            padding-right: 14px !important;
        }

        .pos-cell {
            width: 38px;
            font-weight: 700;
            color: var(--text-gray);
        }

        .points-cell {
            font-weight: 900;
            color: var(--accent-gold);
            background-color: rgba(214, 175, 55, 0.03);
        }

        /* ================= شريط التنقل السفلي الاحترافي (iOS Style) ================= */
        .bottom-navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 68px;
            background: rgba(8, 8, 12, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 9999;
            box-shadow: 0 -8px 25px rgba(0,0,0,0.4);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            width: 25%; /* 4 تبويبات متساوية */
            height: 100%;
            transition: color 0.25s;
        }

        .nav-btn-icon {
            font-size: 1.25rem;
            margin-bottom: 2px;
            transition: transform 0.2s;
        }

        .nav-btn-label {
            font-size: 0.68rem;
            font-weight: 800;
        }

        /* تبويب نشط */
        .nav-btn.active {
            color: var(--accent-gold);
        }

        .nav-btn.active .nav-btn-icon {
            transform: translateY(-1.5px);
            text-shadow: 0 0 8px var(--gold-glow);
        }
    </style>
</head>

            { id: 28, dateStr: "الخميس 30 يوليو 2026", dateTime: "2026-07-30T23:30:00", team1: "صفا الأمجاد", team2: "الصفة", label: "المباراة الثانية", score1: null, score2: null }
        ];

        // التنقل التلقائي الفخم بين التبويبات الأربعة
        function switchActiveTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // تحديد الحالة الزمنية الفورية للمباراة
        function getMatchStatus(m) {
            const now = new Date();
            const start = new Date(m.dateTime);
            const durationLimit = 2 * 60 * 60 * 1000; // نفترض افتراضياً ساعتين للمباراة بالشوطين
            const end = new Date(start.getTime() + durationLimit);

            // لو وضعت نتيجة يدوية في الكود، تعتبر اللعبة منتهية فوراً
            if (m.score1 !== null && m.score2 !== null) {
                return { code: 'completed', text: 'انتهت', badge: 'status-completed' };
            }

            if (now < start) {
                return { code: 'upcoming', text: 'قادمة', badge: 'status-upcoming' };
            } else if (now >= start && now <= end) {
                return { code: 'live', text: 'مباشر الآن ⚽', badge: 'status-live' };
            } else {
                return { code: 'completed', text: 'انتهت', badge: 'status-completed' };
            }
        }

        // فرز وتقسيم وعرض المباريات بشكل ذكي ومؤتمت تماماً
        function buildMatchesUI() {
            const todayListDiv = document.getElementById('today-list');
            const upcomingListDiv = document.getElementById('upcoming-list');
            const pastListDiv = document.getElementById('past-list');

            todayListDiv.innerHTML = '';
            upcomingListDiv.innerHTML = '';
            pastListDiv.innerHTML = '';

            const todayGroups = {};
            const upcomingGroups = {};
            const pastGroups = {};

            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);

            matchesData.forEach(match => {
                const matchTime = new Date(match.dateTime);
                const status = getMatchStatus(match);
                const completeMatchObj = { ...match, status };

                const isFinished = (status.code === 'completed');

                if (isFinished) {
                    // 1. أي مباراة منتهية تذهب فوراً لتبويب السابقة
                    if (!pastGroups[match.dateStr]) pastGroups[match.dateStr] = [];
                    pastGroups[match.dateStr].push(completeMatchObj);
                } else if (matchTime >= todayStart && matchTime <= todayEnd) {
                    // 2. مباريات اليوم الحالي (سواء كانت قادمة في نفس اليوم أو جارية لايف)
                    if (!todayGroups[match.dateStr]) todayGroups[match.dateStr] = [];
                    todayGroups[match.dateStr].push(completeMatchObj);
                } else if (matchTime > todayEnd) {
                    // 3. مباريات الأيام المقبلة المستقبلية
                    if (!upcomingGroups[match.dateStr]) upcomingGroups[match.dateStr] = [];
                    upcomingGroups[match.dateStr].push(completeMatchObj);
                }
            });

            // رندرة تبويب 1: مباريات اليوم
            const todayDays = Object.keys(todayGroups);
            if (todayDays.length === 0) {
                todayListDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚽</div>
                        <div class="empty-title">لا توجد مباريات مجدولة لليوم</div>
                        <div class="empty-desc">يمكنك متابعة مواعيد المواجهات القادمة في تبويب "المقبلة".</div>
                    </div>`;
            } else {
                todayDays.forEach(day => {
                    let sectionHTML = `<div class="day-group"><div class="day-title">🔥 مباريات اليوم • ${day}</div>`;
                    todayGroups[day].forEach(m => {
                        sectionHTML += createPremiumCardHTML(m);
                    });
                    sectionHTML += `</div>`;
                    todayListDiv.innerHTML += sectionHTML;
                });
            }

            // رندرة تبويب 2: المباريات المقبلة
            const upcomingDays = Object.keys(upcomingGroups);
            if (upcomingDays.length === 0) {
                upcomingListDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎉</div>
                        <div class="empty-title">اكتملت جميع مباريات البطولة</div>
                        <div class="empty-desc">تم لعب جميع اللقاءات المجدولة بنجاح.</div>
                    </div>`;
            } else {
                upcomingDays.forEach(day => {
                    let sectionHTML = `<div class="day-group"><div class="day-title">📅 ${day}</div>`;
                    upcomingGroups[day].forEach(m => {
                        sectionHTML += createPremiumCardHTML(m);
                    });
                    sectionHTML += `</div>`;
                    upcomingListDiv.innerHTML += sectionHTML;
                });
            }

            // رندرة تبويب 3: المباريات السابقة
            const pastDays = Object.keys(pastGroups).reverse(); // الأحدث يظهر أولاً بالسابقة
            if (pastDays.length === 0) {
                pastListDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🏁</div>
                        <div class="empty-title">لا توجد مباريات سابقة منتهية بعد</div>
                        <div class="empty-desc">عند انتهاء المواجهات وتسجيل نتائجها ستتحرك تلقائياً وتتحول لنقاط هنا.</div>
                    </div>`;
            } else {
                pastDays.forEach(day => {
                    let sectionHTML = `<div class="day-group"><div class="day-title">🏁 نتائج ومباريات سابقة • ${day}</div>`;
                    pastGroups[day].forEach(m => {
                        sectionHTML += createPremiumCardHTML(m);
                    });
                    sectionHTML += `</div>`;
                    pastListDiv.innerHTML += sectionHTML;
                });
            }
        }

        // كود بناء بطاقة اللقاء بجودة عالية جداً
        function createPremiumCardHTML(m) {
            let scoreUI = `<div class="vs-pill">VS</div>`;
            
            // في حال كانت منتهية أو لايف، نظهر لوحة النتيجة الرقمية
            if (m.status.code === 'completed' || m.status.code === 'live') {
                const s1 = m.score1 !== null ? m.score1 : '0';
                const s2 = m.score2 !== null ? m.score2 : '0';
                scoreUI = `
                    <div class="score-value">
                        <span>${s1}</span>
                        <span style="font-size:1.1rem; color:var(--text-gray); font-weight:normal;">-</span>
                        <span>${s2}</span>
                    </div>
                `;
            }

            const timeRaw = new Date(m.dateTime);
            const formattedTime = timeRaw.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });

            return `
                <div class="match-card">
                    <div class="match-header">
                        <span>🏆 ${m.label} • ${formattedTime}</span>
                        <span class="status-badge ${m.status.badge}">${m.status.text}</span>
                    </div>
                    <div class="match-body">
                        <div class="team-box">
                            <div class="team-crest">${m.team1[0]}</div>
                            <div class="team-name">${m.team1}</div>
                        </div>
                        <div class="score-box">
                            ${scoreUI}
                        </div>
                        <div class="team-box">
                            <div class="team-crest">${m.team2[0]}</div>
                            <div class="team-name">${m.team2}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // نظام احتساب الترتيب والنقاط المتطور للأفرقة الـ 28
        function processStandings() {
            const teamStats = {};
            
            allTeamsList.forEach(team => {
                teamStats[team] = { name: team, played: 0, wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
            });

            // تصفية وحساب النتائج للمباريات المدخلة فقط
            matchesData.forEach(m => {
                if (m.score1 !== null && m.score2 !== null) {
                    const t1 = m.team1;
                    const t2 = m.team2;
                    const s1 = parseInt(m.score1);
                    const s2 = parseInt(m.score2);

                    teamStats[t1].played += 1;
                    teamStats[t2].played += 1;
                    teamStats[t1].gf += s1;
                    teamStats[t1].ga += s2;
                    teamStats[t2].gf += s2;
                    teamStats[t2].ga += s1;

                    if (s1 > s2) {
                        teamStats[t1].wins += 1;
                        teamStats[t1].pts += 3;
                        teamStats[t2].losses += 1;
                    } else if (s1 < s2) {
                        teamStats[t2].wins += 1;
                        teamStats[t2].pts += 3;
                        teamStats[t1].losses += 1;
                    } else {
                        teamStats[t1].draws += 1;
                        teamStats[t1].pts += 1;
                        teamStats[t2].draws += 1;
                        teamStats[t2].pts += 1;
                    }
                }
            });

            const sortedTeams = Object.values(teamStats);
            sortedTeams.forEach(team => {
                team.gd = team.gf - team.ga;
            });

            // الترتيب الرسمي: نقاط -> فارق أهداف -> أهداف مسجلة
            sortedTeams.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });

            const tbody = document.getElementById('standings-tbody');
            tbody.innerHTML = '';

            sortedTeams.forEach((team, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td class="pos-cell">${index + 1}</td>
                        <td class="text-start" style="font-weight: 800; color: #fff;">${team.name}</td>
                        <td>${team.played}</td>
                        <td style="color:var(--success-green);">${team.wins}</td>
                        <td style="color:#ffcc00;">${team.draws}</td>
                        <td style="color:#ff3d00;">${team.losses}</td>
                        <td>${team.gf}</td>
                        <td>${team.ga}</td>
                        <td dir="ltr" style="color:${team.gd > 0 ? 'var(--success-green)' : team.gd < 0 ? '#ff3d00' : '#888'}">
                            ${team.gd > 0 ? '+' + team.gd : team.gd}
                        </td>
                        <td class="points-cell">${team.pts}</td>
                    </tr>
                `;
            });
        }

        // تشغيل نظام العداد التلقائي المصغر (النيون التيكر) لأقرب مواجهة
        function activateLiveTimer() {
            const now = new Date();
            const nextMatch = matchesData.find(m => new Date(m.dateTime) > now && m.score1 === null);

            if (!nextMatch) {
                document.getElementById('countdown-area').style.display = 'none';
                return;
            }

            document.getElementById('countdown-area').style.display = 'flex';
            document.getElementById('countdown-match-name').innerHTML = `
                المواجهة المنتظرة: <b>${nextMatch.team1}</b> <span style="color:var(--text-gray)">ضد</span> <b>${nextMatch.team2}</b>
            `;

            const targetTime = new Date(nextMatch.dateTime).getTime();

            function updateTimer() {
                const currentTime = new Date().getTime();
                const difference = targetTime - currentTime;

                if (difference <= 0) {
                    buildMatchesUI();
                    processStandings();
                    activateLiveTimer();
                    return;
                }

                const d = Math.floor(difference / (1000 * 60 * 60 * 24));
                const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((difference % (1000 * 60)) / 1000);

                // تنسيق الشريط الصغير: يوم، ساعة، دقيقة
                document.getElementById('mini-timer-text').textContent = 
                    `${String(d).padStart(2, '0')}ي : ${String(h).padStart(2, '0')}س : ${String(m).padStart(2, '0')}د : ${String(s).padStart(2, '0')}ث`;
            }

            updateTimer();
            setInterval(updateTimer, 1000);
        }

        window.onload = function() {
            buildMatchesUI();
            processStandings();
            activateLiveTimer();
        };
    </script>
