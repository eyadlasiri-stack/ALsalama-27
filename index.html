    <style>

            /* الألوان المستوحاة من الشعار */
            --brand-dark: #63121d; /* عنابي الشعار العميق */
            --brand-main: #8B1D2A; /* عنابي أساسي */
            --brand-gold: #C5A059; /* ذهبي ملكي */
            --gold-glow: rgba(197, 160, 89, 0.2);
            --bg-color: #070709;
            --card-bg: rgba(20, 20, 24, 0.75);
            --card-border: rgba(197, 160, 89, 0.15);
            --text-pure: #ffffff;
            --text-gray: #a1a5b5;
            --success-green: #00e676;
            --live-red: #ff3d00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-pure);
            line-height: 1.6;
            padding-bottom: 100px;
            min-height: 100vh;
            position: relative;
        }

        /* العلامة المائية الخافتة للشعار في الخلفية كاملة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/DjV7cSd/IMG-8599.jpg');
            background-position: center;
            background-size: 350px;
            background-repeat: repeat;
            opacity: 0.03; /* خافت جداً واحترافي */
            pointer-events: none;
            z-index: -1;
        }

        /* الهيدر الفخم المدمج بالهوية الرسمية والشعار */
        header {
            background: linear-gradient(180deg, rgba(99, 18, 29, 0.95) 0%, rgba(7, 7, 9, 0.95) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--brand-gold);
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-logo {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 2px solid var(--brand-gold);
            box-shadow: 0 0 15px var(--gold-glow);
            margin-bottom: 10px;
            object-fit: cover;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-pure);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 0.75rem;
            color: var(--brand-gold);
            margin-top: 4px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 20px 12px;
        }

        .tab-content { display: none; }
        .tab-content.active {
            display: block;
            animation: appFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* شريط العداد التنازلي المصغر */
        .mini-countdown-bar {
            background: rgba(139, 29, 42, 0.15); 
            border: 1px solid var(--brand-gold);
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .ticker-dot {
            width: 8px; height: 8px;
            background-color: var(--brand-gold);
            border-radius: 50%;
            margin-left: 10px;
            box-shadow: 0 0 10px var(--brand-gold);
            animation: pulseDot 1.5s infinite;
        }

        @keyframes pulseDot {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .ticker-match-name {
            font-weight: 800; color: #fff;
            flex-grow: 1; text-align: right;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .ticker-divider { color: rgba(255, 255, 255, 0.2); margin: 0 10px; }
        .mini-timer-text { font-weight: 900; color: var(--brand-gold); direction: ltr; }

        /* تصميم بطاقات المباريات */
        .day-group { margin-bottom: 24px; }
        .day-title {
            font-size: 0.85rem; font-weight: 800;
            color: var(--brand-gold); margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
            padding-right: 4px;
        }

        .day-title::before {
            content: ''; display: inline-block;
            width: 4px; height: 16px;
            background: var(--brand-main);
            border-radius: 4px;
        }

        .match-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px 16px;
            margin-bottom: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }

        /* لمسة تصميمية داخل الكرت */
        .match-card::before {
            content: ""; position: absolute;
            top: 0; right: 0; width: 40px; height: 40px;
            background: radial-gradient(circle, var(--brand-main) 0%, transparent 70%);
            opacity: 0.2;
        }

        .match-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; color: var(--text-gray);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px; margin-bottom: 14px; font-weight: 700;
        }

        .status-badge { padding: 3px 10px; border-radius: 20px; font-weight: 800; font-size: 0.65rem; }
        .status-upcoming { background: rgba(197, 160, 89, 0.1); color: var(--brand-gold); border: 1px solid rgba(197, 160, 89, 0.2); }
        .status-live { background: rgba(255, 61, 0, 0.15); color: var(--live-red); border: 1px solid rgba(255, 61, 0, 0.3); animation: liveBlink 1s infinite alternate; }
        .status-completed { background: rgba(0, 230, 118, 0.1); color: var(--success-green); }

        @keyframes liveBlink { from { opacity: 0.6; } to { opacity: 1; } }

        .match-body { display: flex; justify-content: space-between; align-items: center; }
        .team-box { flex: 1; display: flex; flex-direction: column; align-items: center; width: 40%; }
        
        .team-crest {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--brand-dark) 0%, #1a1a20 100%);
            border: 1.5px solid var(--brand-gold);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #fff; font-size: 1.2rem; margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .team-name { font-size: 0.88rem; font-weight: 800; text-align: center; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
        .score-box { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 80px; }
        .score-value { font-size: 1.8rem; font-weight: 900; color: var(--brand-gold); display: flex; gap: 12px; align-items: center; text-shadow: 0 2px 10px rgba(197, 160, 89, 0.2); }
        .vs-pill { font-size: 0.7rem; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; color: var(--text-gray); font-weight: 800; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-gray); }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.8; }
        .empty-title { font-size: 0.9rem; font-weight: 800; color: var(--brand-gold); margin-bottom: 6px; }
        .empty-desc { font-size: 0.75rem; color: var(--text-gray); }

        /* جدول ترتيب الأفرقة */
        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            overflow-x: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .custom-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: center; min-width: 520px; }
        .custom-table th { background-color: rgba(99, 18, 29, 0.3); color: var(--brand-gold); font-weight: 800; padding: 14px 6px; font-size: 0.75rem; border-bottom: 1px solid var(--card-border); }
        .custom-table td { padding: 14px 6px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); font-weight: 600; }
        .custom-table tr:last-child td { border-bottom: none; }
        .custom-table tr:nth-child(-n+4) .pos-cell { color: var(--brand-gold); font-weight: 900; }
        .text-start { text-align: right; padding-right: 14px !important; }
        .pos-cell { width: 40px; font-weight: 700; color: var(--text-gray); }
        .points-cell { font-weight: 900; color: #fff; background-color: rgba(197, 160, 89, 0.15); border-radius: 4px; }

        /* شريط التنقل السفلي الاحترافي */
        .bottom-navigation {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(197, 160, 89, 0.2);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 9999; box-shadow: 0 -8px 25px rgba(0,0,0,0.5);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: none; border: none; color: var(--text-gray);
            cursor: pointer; width: 25%; height: 100%; transition: all 0.3s ease;
        }

        .nav-btn-icon { font-size: 1.3rem; margin-bottom: 4px; transition: transform 0.2s; filter: grayscale(100%); opacity: 0.6;}
        .nav-btn-label { font-size: 0.68rem; font-weight: 800; }

        .nav-btn.active { color: var(--brand-gold); }
        .nav-btn.active .nav-btn-icon { transform: translateY(-2px); filter: grayscale(0%); opacity: 1; text-shadow: 0 0 10px var(--gold-glow); }
    </style>
</head>

        function switchActiveTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- التحديث الجوهري: اليوم يبدأ وينتهي الساعة 6:00 صباحاً ---
        // دالة لإرجاع تاريخ المباراة البرمجي (بإزاحة 6 ساعات للخلف)
        function getTournamentDayTimestamp(dateObj) {
            let d = new Date(dateObj.getTime());
            d.setHours(d.getHours() - 6); 
            // نأخذ فقط السنة والشهر واليوم للمقارنة
            return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        }

        function getMatchStatus(m) {
            const now = new Date();
            const start = new Date(m.dateTime);
            const durationLimit = 2 * 60 * 60 * 1000; // ساعتين افتراضياً
            const end = new Date(start.getTime() + durationLimit);

            if (m.score1 !== null && m.score2 !== null) return { code: 'completed', text: 'انتهت', badge: 'status-completed' };
            if (now > end) return { code: 'completed', text: 'انتهت (بانتظار النتيجة)', badge: 'status-completed' }; // انتهى الوقت
            if (now >= start && now <= end) return { code: 'live', text: 'مباشر الآن ⚽', badge: 'status-live' };
            return { code: 'upcoming', text: 'قادمة', badge: 'status-upcoming' };
        }

        function buildMatchesUI() {
            const todayListDiv = document.getElementById('today-list');
            const upcomingListDiv = document.getElementById('upcoming-list');
            const pastListDiv = document.getElementById('past-list');

            todayListDiv.innerHTML = ''; upcomingListDiv.innerHTML = ''; pastListDiv.innerHTML = '';
            const todayGroups = {}; const upcomingGroups = {}; const pastGroups = {};

            const now = new Date();
            // الحصول على تاريخ "يوم البطولة الحالي" استناداً للـ 6 صباحاً
            const currentTournamentDayTS = getTournamentDayTimestamp(now);

            matchesData.forEach(match => {
                const matchTime = new Date(match.dateTime);
                const status = getMatchStatus(match);
                const completeMatchObj = { ...match, status };
                
                // حساب يوم المباراة البرمجي
                const matchTournamentDayTS = getTournamentDayTimestamp(matchTime);
                const isFinished = (status.code === 'completed');

                if (isFinished) {
                    // مباريات منتهية
                    if (!pastGroups[match.dateStr]) pastGroups[match.dateStr] = [];
                    pastGroups[match.dateStr].push(completeMatchObj);
                } else {
                    if (matchTournamentDayTS === currentTournamentDayTS || status.code === 'live') {
                        // مباريات نفس اليوم (حتى الساعة 6 فجراً من اليوم التالي)
                        if (!todayGroups[match.dateStr]) todayGroups[match.dateStr] = [];
                        todayGroups[match.dateStr].push(completeMatchObj);
                    } else if (matchTournamentDayTS > currentTournamentDayTS) {
                        // مباريات في أيام قادمة
                        if (!upcomingGroups[match.dateStr]) upcomingGroups[match.dateStr] = [];
                        upcomingGroups[match.dateStr].push(completeMatchObj);
                    }
                }
            });

            // رسم تبويب اليوم
            const todayDays = Object.keys(todayGroups);
            if (todayDays.length === 0) {
                todayListDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-title">لا توجد مباريات مجدولة لليوم</div><div class="empty-desc">يمكنك متابعة المواعيد في تبويب "المقبلة".</div></div>`;
            } else {
                todayDays.forEach(day => {
                    let html = `<div class="day-group"><div class="day-title">🔥 سهرة اليوم • ${day}</div>`;
                    todayGroups[day].forEach(m => html += createPremiumCardHTML(m));
                    todayListDiv.innerHTML += html + `</div>`;
                });
            }

            // رسم تبويب المقبلة
            const upcomingDays = Object.keys(upcomingGroups);
            if (upcomingDays.length === 0) {
                upcomingListDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">لا توجد مباريات قادمة</div></div>`;
            } else {
                upcomingDays.forEach(day => {
                    let html = `<div class="day-group"><div class="day-title">📅 ${day}</div>`;
                    upcomingGroups[day].forEach(m => html += createPremiumCardHTML(m));
                    upcomingListDiv.innerHTML += html + `</div>`;
                });
            }

            // رسم تبويب السابقة
            const pastDays = Object.keys(pastGroups).reverse();
            if (pastDays.length === 0) {
                pastListDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">🏁</div><div class="empty-title">لا توجد نتائج سابقة</div></div>`;
            } else {
                pastDays.forEach(day => {
                    let html = `<div class="day-group"><div class="day-title">🏁 نتائج • ${day}</div>`;
                    pastGroups[day].forEach(m => html += createPremiumCardHTML(m));
                    pastListDiv.innerHTML += html + `</div>`;
                });
            }
        }

        function createPremiumCardHTML(m) {
            let scoreUI = `<div class="vs-pill">VS</div>`;
            if (m.status.code === 'completed' || m.status.code === 'live') {
                const s1 = m.score1 !== null ? m.score1 : '-';
                const s2 = m.score2 !== null ? m.score2 : '-';
                scoreUI = `<div class="score-value"><span>${s1}</span><span style="font-size:1.1rem; color:var(--text-gray); font-weight:normal;">:</span><span>${s2}</span></div>`;
            }

            const t = new Date(m.dateTime);
            const formattedTime = t.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });

            return `
                <div class="match-card">
                    <div class="match-header">
                        <span>🏆 ${m.label} • ${formattedTime}</span>
                        <span class="status-badge ${m.status.badge}">${m.status.text}</span>
                    </div>
                    <div class="match-body">
                        <div class="team-box"><div class="team-crest">${m.team1[0]}</div><div class="team-name">${m.team1}</div></div>
                        <div class="score-box">${scoreUI}</div>
                        <div class="team-box"><div class="team-crest">${m.team2[0]}</div><div class="team-name">${m.team2}</div></div>
                    </div>
                </div>
            `;
        }

        function processStandings() {
            const teamStats = {};
            allTeamsList.forEach(t => teamStats[t] = { name: t, played: 0, wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, gd: 0, pts: 0 });

            matchesData.forEach(m => {
                if (m.score1 !== null && m.score2 !== null) {
                    const t1 = m.team1; const t2 = m.team2;
                    const s1 = parseInt(m.score1); const s2 = parseInt(m.score2);

                    teamStats[t1].played++; teamStats[t2].played++;
                    teamStats[t1].gf += s1; teamStats[t1].ga += s2;
                    teamStats[t2].gf += s2; teamStats[t2].ga += s1;

                    if (s1 > s2) { teamStats[t1].wins++; teamStats[t1].pts+=3; teamStats[t2].losses++; }
                    else if (s1 < s2) { teamStats[t2].wins++; teamStats[t2].pts+=3; teamStats[t1].losses++; }
                    else { teamStats[t1].draws++; teamStats[t1].pts++; teamStats[t2].draws++; teamStats[t2].pts++; }
                }
            });

            const sorted = Object.values(teamStats);
            sorted.forEach(t => t.gd = t.gf - t.ga);
            sorted.sort((a, b) => { if (b.pts !== a.pts) return b.pts - a.pts; if (b.gd !== a.gd) return b.gd - a.gd; return b.gf - a.gf; });

            const tbody = document.getElementById('standings-tbody');
            tbody.innerHTML = '';
            sorted.forEach((team, i) => {
                tbody.innerHTML += `
                    <tr>
                        <td class="pos-cell">${i + 1}</td>
                        <td class="text-start" style="font-weight: 800; color: #fff;">${team.name}</td>
                        <td>${team.played}</td>
                        <td style="color:var(--success-green);">${team.wins}</td>
                        <td style="color:var(--brand-gold);">${team.draws}</td>
                        <td style="color:#ff3d00;">${team.losses}</td>
                        <td>${team.gf}</td><td>${team.ga}</td>
                        <td dir="ltr" style="color:${team.gd > 0 ? 'var(--success-green)' : team.gd < 0 ? '#ff3d00' : '#888'}">${team.gd > 0 ? '+'+team.gd : team.gd}</td>
                        <td class="points-cell">${team.pts}</td>
                    </tr>
                `;
            });
        }

        function activateLiveTimer() {
            const now = new Date();
            const nextMatch = matchesData.find(m => new Date(m.dateTime) > now && m.score1 === null);

            if (!nextMatch) { document.getElementById('countdown-area').style.display = 'none'; return; }

            document.getElementById('countdown-area').style.display = 'flex';
            document.getElementById('countdown-match-name').innerHTML = `المواجهة القادمة: <b>${nextMatch.team1}</b> ضد <b>${nextMatch.team2}</b>`;

            const targetTime = new Date(nextMatch.dateTime).getTime();
            function updateTimer() {
                const diff = targetTime - new Date().getTime();
                if (diff <= 0) { buildMatchesUI(); processStandings(); activateLiveTimer(); return; }
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('mini-timer-text').textContent = `${String(d).padStart(2,'0')}ي : ${String(h).padStart(2,'0')}س : ${String(m).padStart(2,'0')}د`;
            }
            updateTimer(); setInterval(updateTimer, 60000); // تحديث كل دقيقة لتخفيف الضغط
        }

        window.onload = function() {
            buildMatchesUI();
            processStandings();
            activateLiveTimer();
        };
    </script>
</body>
</html>
