<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- خط تجول الاحترافي بأوزان متعددة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #060608 0%, #0c0c12 100%);
            --card-bg: rgba(22, 22, 33, 0.7); /* زجاجي داكن */
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-gold: #d4af37;   /* ذهبي فخم دافئ */
            --gold-glow: rgba(212, 175, 55, 0.2);
            --primary-crimson: #9e1b32; /* عنابي ملكي */
            --text-pure: #ffffff;
            --text-gray: #9ba0b0;
            --success-green: #00e676;
            --live-red: #ff3d00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-pure);
            line-height: 1.6;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* هيدر سينمائي فخم */
        header {
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #ffffff 30%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-top: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* محتوى التبويبات مع تأثير انتقالي ناعم */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= العد التنازلي الإمبراطوري الجديد ================= */
        .premium-countdown {
            background: radial-gradient(circle at top right, rgba(158, 27, 50, 0.15), transparent), var(--card-bg);
            border: 1px solid rgba(214, 175, 55, 0.25);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .premium-countdown::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0.5;
        }

        .countdown-badge {
            background: rgba(214, 175, 55, 0.12);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .match-target-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-pure);
            margin-bottom: 18px;
        }

        .premium-timer {
            display: flex;
            justify-content: center;
            gap: 14px;
            direction: ltr;
        }

        .timer-unit {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            min-width: 65px;
            padding: 10px 6px;
            position: relative;
        }

        .timer-unit::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 2px;
            background: var(--accent-gold);
            border-radius: 2px 2px 0 0;
            box-shadow: 0 0 8px var(--accent-gold);
        }

        .unit-num {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-pure);
            display: block;
            line-height: 1.2;
        }

        .unit-lbl {
            font-size: 0.65rem;
            color: var(--text-gray);
            font-weight: 700;
            margin-top: 4px;
            display: block;
        }

        /* ================= بطاقات المباريات الفخمة ================= */
        .day-group {
            margin-bottom: 30px;
        }

        .day-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text-gray);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 4px;
        }

        .day-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: var(--accent-gold);
            border-radius: 2px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, border-color 0.2s;
        }

        .match-card:active {
            transform: scale(0.98);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-gray);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .status-badge {
            padding: 3px 10px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.7rem;
        }

        .status-upcoming { background: rgba(255, 255, 255, 0.05); color: var(--text-gray); border: 1px solid rgba(255,255,255,0.05); }
        .status-live { background: rgba(255, 61, 0, 0.15); color: var(--live-red); border: 1px solid var(--live-red); animation: pulseGlow 1.2s infinite alternate; }
        .status-completed { background: rgba(0, 230, 118, 0.12); color: var(--success-green); border: 1px solid var(--success-green); }

        @keyframes pulseGlow { from { opacity: 0.7; } to { opacity: 1; } }

        .match-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .team-crest {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #1f1f2e 0%, #14141f 100%);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: var(--accent-gold);
            font-size: 1.25rem;
            margin-bottom: 8px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .team-name {
            font-size: 0.9rem;
            font-weight: 800;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
            color: #f1f1f5;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 80px;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-pure);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .vs-pill {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 30px;
            color: var(--text-gray);
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* ================= جدول ترتيب الأفرقة المطور ================= */
        .table-container {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: center;
            min-width: 520px;
        }

        .custom-table th {
            background-color: rgba(12, 12, 18, 0.5);
            color: var(--text-gray);
            font-weight: 800;
            padding: 14px 8px;
            font-size: 0.78rem;
            border-bottom: 1px solid var(--card-border);
        }

        .custom-table td {
            padding: 14px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-weight: 600;
        }

        .custom-table tr:last-child td {
            border-bottom: none;
        }

        /* تمييز الصفوف الأربعة الأولى المؤهلة */
        .custom-table tr:nth-child(-n+4) .pos-cell {
            color: var(--accent-gold);
            font-weight: 900;
            font-size: 0.95rem;
        }

        .text-start {
            text-align: right;
            padding-right: 16px !important;
        }

        .pos-cell {
            width: 42px;
            font-weight: 700;
            color: var(--text-gray);
        }

        .points-cell {
            font-weight: 900;
            color: var(--accent-gold);
            background-color: rgba(214, 175, 55, 0.04);
        }

        /* ================= شريط التنقل السفلي الفخم (iOS Style) ================= */
        .bottom-navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 9999;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
            padding-bottom: env(safe-area-inset-bottom); /* توافق مع شاشات الآيفون الحديثة */
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            width: 33.33%;
            height: 100%;
            transition: color 0.3s;
        }

        .nav-btn-icon {
            font-size: 1.35rem;
            margin-bottom: 3px;
            transition: transform 0.2s;
        }

        .nav-btn-label {
            font-size: 0.72rem;
            font-weight: 800;
        }

        /* الحالة النشطة للتبويب */
        .nav-btn.active {
            color: var(--accent-gold);
        }

        .nav-btn.active .nav-btn-icon {
            transform: translateY(-2px);
            text-shadow: 0 0 10px var(--gold-glow);
        }

</head>

            { id: 26, dateStr: "الأربعاء 29 يوليو 2026", dateTime: "2026-07-29T23:30:00", team1: "الجرد", team2: "شباب الفلحة", label: "المباراة الثانية", score1: null, score2: null },
            
            { id: 27, dateStr: "الخميس 30 يوليو 2026", dateTime: "2026-07-30T22:00:00", team1: "الشعب", team2: "ثلاثاء يبة", label: "المباراة الأولى", score1: null, score2: null },
            { id: 28, dateStr: "الخميس 30 يوليو 2026", dateTime: "2026-07-30T23:30:00", team1: "صفا الأمجاد", team2: "الصفة", label: "المباراة الثانية", score1: null, score2: null }
        ];

        // التبديل بين التبويبات بسلاسة
        function switchActiveTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // تحديد الحالة الزمنية الفورية للمباراة
        function getMatchStatus(m) {
            const now = new Date();
            const start = new Date(m.dateTime);
            const durationLimit = 2 * 60 * 60 * 1000; // مدة المباراة الافتراضية ساعتان
            const end = new Date(start.getTime() + durationLimit);

            // إذا أُدخلت نتيجة بشكل يدوي، تعتبر منتهية فوراً
            if (m.score1 !== null && m.score2 !== null) {
                return { code: 'completed', text: 'انتهت', badge: 'status-completed' };
            }

            if (now < start) {
                return { code: 'upcoming', text: 'قادمة', badge: 'status-upcoming' };
            } else if (now >= start && now <= end) {
                return { code: 'live', text: 'مباشر الآن ⚽', badge: 'status-live' };
            } else {
                return { code: 'completed', text: 'انتهت', badge: 'status-completed' };
            }
        }

        // بناء وتوليد الشاشات والقوائم تلقائياً
        function buildMatchesUI() {
            const upcomingListDiv = document.getElementById('upcoming-list');
            const pastListDiv = document.getElementById('past-list');

            upcomingListDiv.innerHTML = '';
            pastListDiv.innerHTML = '';

            const upcomingGroups = {};
            const pastGroups = {};

            matchesData.forEach(match => {
                const status = getMatchStatus(match);
                const completeMatchObj = { ...match, status };

                if (status.code === 'upcoming') {
                    if (!upcomingGroups[match.dateStr]) upcomingGroups[match.dateStr] = [];
                    upcomingGroups[match.dateStr].push(completeMatchObj);
                } else {
                    // المباريات المنتهية والمباشرة تُنقل تلقائياً لتبويب المباريات السابقة
                    if (!pastGroups[match.dateStr]) pastGroups[match.dateStr] = [];
                    pastGroups[match.dateStr].push(completeMatchObj);
                }
            });

            // رندرة المباريات القادمة
            const upcomingDays = Object.keys(upcomingGroups);
            if (upcomingDays.length === 0) {
                upcomingListDiv.innerHTML = `<div style="text-align:center; padding:50px 20px; color:var(--text-gray); font-size:0.9rem;">اكتملت جميع مباريات البطولة بنجاح 🎉</div>`;
            } else {
                upcomingDays.forEach(day => {
                    let sectionHTML = `<div class="day-group"><div class="day-title">📅 ${day}</div>`;
                    upcomingGroups[day].forEach(m => {
                        sectionHTML += createPremiumCardHTML(m);
                    });
                    sectionHTML += `</div>`;
                    upcomingListDiv.innerHTML += sectionHTML;
                });
            }

            // رندرة المباريات السابقة (ستكون فارغة في البداية وتنتقل تلقائياً بعد مرور وقت اللقاء)
            const pastDays = Object.keys(pastGroups).reverse(); // إظهار اللقاء الأحدث أولاً في السابقة
            if (pastDays.length === 0) {
                pastListDiv.innerHTML = `
                    <div style="text-align:center; padding:80px 20px; color:var(--text-gray);">
                        <div style="font-size: 2.5rem; margin-bottom: 15px;">🏁</div>
                        <p style="font-size:0.9rem; font-weight:700;">المباريات السابقة فارغة حالياً</p>
                        <p style="font-size:0.75rem; color: #666; margin-top:5px;">بمجرد انطلاق البطولة ونهاية المباريات، ستنتقل المواجهات تلقائياً إلى هنا لتتحول إلى نقاط في الترتيب.</p>
                    </div>`;
            } else {
                pastDays.forEach(day => {
                    let sectionHTML = `<div class="day-group"><div class="day-title">🏁 ${day}</div>`;
                    pastGroups[day].forEach(m => {
                        sectionHTML += createPremiumCardHTML(m);
                    });
                    sectionHTML += `</div>`;
                    pastListDiv.innerHTML += sectionHTML;
                });
            }
        }

        // كود تصميم بطاقة المباراة الفاخرة
        function createPremiumCardHTML(m) {
            let scoreUI = `<div class="vs-pill">VS</div>`;
            
            // في حال كانت منتهية أو مباشرة، نعرض صندوق الأرقام الأنيق
            if (m.status.code === 'completed' || m.status.code === 'live') {
                const s1 = m.score1 !== null ? m.score1 : '0';
                const s2 = m.score2 !== null ? m.score2 : '0';
                scoreUI = `
                    <div class="score-value">
                        <span>${s1}</span>
                        <span style="font-size:1.2rem; color:var(--text-gray); font-weight:500;">-</span>
                        <span>${s2}</span>
                    </div>
                `;
            }

            const timeRaw = new Date(m.dateTime);
            const formattedTime = timeRaw.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });

            return `
                <div class="match-card">
                    <div class="match-header">
                        <span>🏆 ${m.label} • ${formattedTime}</span>
                        <span class="status-badge ${m.status.badge}">${m.status.text}</span>
                    </div>
                    <div class="match-body">
                        <div class="team-box">
                            <div class="team-crest">${m.team1[0]}</div>
                            <div class="team-name">${m.team1}</div>
                        </div>
                        <div class="score-box">
                            ${scoreUI}
                        </div>
                        <div class="team-box">
                            <div class="team-crest">${m.team2[0]}</div>
                            <div class="team-name">${m.team2}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // الحساب الذكي والفرز التلقائي لترتيب الأفرقة
        function processStandings() {
            const teamStats = {};
            
            // تهيئة إحصائيات الـ 28 فريقاً
            allTeamsList.forEach(team => {
                teamStats[team] = { name: team, played: 0, wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
            });

            // حساب المباريات التي تحتوي على نتائج مسجلة فقط
            matchesData.forEach(m => {
                if (m.score1 !== null && m.score2 !== null) {
                    const t1 = m.team1;
                    const t2 = m.team2;
                    const s1 = parseInt(m.score1);
                    const s2 = parseInt(m.score2);

                    teamStats[t1].played += 1;
                    teamStats[t2].played += 1;
                    teamStats[t1].gf += s1;
                    teamStats[t1].ga += s2;
                    teamStats[t2].gf += s2;
                    teamStats[t2].ga += s1;

                    if (s1 > s2) {
                        teamStats[t1].wins += 1;
                        teamStats[t1].pts += 3;
                        teamStats[t2].losses += 1;
                    } else if (s1 < s2) {
                        teamStats[t2].wins += 1;
                        teamStats[t2].pts += 3;
                        teamStats[t1].losses += 1;
                    } else {
                        teamStats[t1].draws += 1;
                        teamStats[t1].pts += 1;
                        teamStats[t2].draws += 1;
                        teamStats[t2].pts += 1;
                    }
                }
            });

            // تحويل البيانات لمصفوفة لفرزها
            const sortedTeams = Object.values(teamStats);
            sortedTeams.forEach(team => {
                team.gd = team.gf - team.ga;
            });

            // الفرز الرسمي: النقاط -> فارق الأهداف -> الأهداف المسجلة
            sortedTeams.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });

            // توليد صفوف الجدول في الصفحة
            const tbody = document.getElementById('standings-tbody');
            tbody.innerHTML = '';

            sortedTeams.forEach((team, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td class="pos-cell">${index + 1}</td>
                        <td class="text-start" style="font-weight: 800; color: #fff;">${team.name}</td>
                        <td>${team.played}</td>
                        <td style="color:var(--success-green);">${team.wins}</td>
                        <td style="color:#ffcc00;">${team.draws}</td>
                        <td style="color:#ff3d00;">${team.losses}</td>
                        <td>${team.gf}</td>
                        <td>${team.ga}</td>
                        <td dir="ltr" style="color:${team.gd > 0 ? 'var(--success-green)' : team.gd < 0 ? '#ff3d00' : '#888'}">
                            ${team.gd > 0 ? '+' + team.gd : team.gd}
                        </td>
                        <td class="points-cell">${team.pts}</td>
                    </tr>
                `;
            });
        }

        // تشغيل نظام العد التنازلي التلقائي الذكي لأقرب مواجهة مقبلة بالثواني
        function activateLiveTimer() {
            const now = new Date();
            // البحث عن المباراة القادمة التي لم تلعب بعد ووقتها في المستقبل
            const nextMatch = matchesData.find(m => new Date(m.dateTime) > now && m.score1 === null);

            if (!nextMatch) {
                document.getElementById('countdown-area').style.display = 'none';
                return;
            }

            document.getElementById('countdown-area').style.display = 'block';
            document.getElementById('countdown-match-name').innerHTML = `
                <span style="color: var(--accent-gold);">${nextMatch.team1}</span> 
                <span style="color:var(--text-gray); font-weight:normal; margin: 0 5px;">ضد</span> 
                <span style="color: var(--accent-gold);">${nextMatch.team2}</span>
            `;

            const targetTime = new Date(nextMatch.dateTime).getTime();

            function updateTimer() {
                const currentTime = new Date().getTime();
                const difference = targetTime - currentTime;

                // إذا انتهى وقت الانتظار تبدأ المباراة وتتحدث القوائم
                if (difference <= 0) {
                    buildMatchesUI();
                    processStandings();
                    activateLiveTimer();
                    return;
                }

                const d = Math.floor(difference / (1000 * 60 * 60 * 24));
                const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById('d-days').textContent = String(d).padStart(2, '0');
                document.getElementById('d-hours').textContent = String(h).padStart(2, '0');
                document.getElementById('d-mins').textContent = String(m).padStart(2, '0');
                document.getElementById('d-secs').textContent = String(s).padStart(2, '0');
            }

            updateTimer();
            setInterval(updateTimer, 1000);
        }

        // تشغيل البث الكامل والربط التلقائي فور تشغيل التطبيق
        window.onload = function() {
            buildMatchesUI();
            processStandings();
            activateLiveTimer();
        };
    </script>
